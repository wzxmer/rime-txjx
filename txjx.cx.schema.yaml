# Rime schema settings
# encoding: utf-8

schema:
  schema_id: txjx.cx
  name: 天行键读音提示辅助方案·勿选
  version: "2026年5月4日"
  author:
    - ProudCat
    - 浮生 <wzxmer@outlook.com>
  description: |
    仅用于部署 txjx.cx 读音词典，供单字读音提示 ReverseLookup 使用。

engine:
  processors:
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"
  max_code_length: 6
  algebra:
    - derive/^.(.*)$/`$1/
    - derive/^(.).(.*)$/$1`$2/
    - derive/^(..).(.*)$/$1`$2/
    - derive/^(...).(.*)$/$1`$2/
    - derive/^(....).(.*)$/$1`$2/
    - derive/^(.....).$/$1`/

translator:
  dictionary: dicts/txjx.cx
  db_class: tabledb
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false

key_binder:
  import_preset: default
