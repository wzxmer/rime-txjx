# Rime schema settings
# encoding: utf-8

schema:
  schema_id: txjx.gbk
  name: 天行键GBK字集辅助方案·勿选
  version: "2026年5月2日"
  author:
    - ProudCat
    - 浮生 <wzxmer@outlook.com>
  description: |
    仅用于部署 txjx.gbk 词典，供 GBK 反查与单字编码提示使用。

engine:
  processors:
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"

translator:
  dictionary: txjx.gbk
  db_class: tabledb
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false

key_binder:
  import_preset: default
