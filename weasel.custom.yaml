# weasel.custom.yaml
patch:
  show_notifications: false
  app_options:
    excel.exe:
      ascii_mode: false
    msedge.exe:
      ascii_mode: false
    qq.exe:
      ascii_mode: false
    wechat.exe:
      ascii_mode: false
    weixin.exe:
      ascii_mode: false
    #chrome.exe:
    #  ascii_mode: false
    telegram.exe:
      ascii_mode: false
  ascii_composer: # 英文模式配置
    good_old_caps_lock: false # 用`Caps Lock`切换英文模式时，是否激活大写锁定（默认关闭）
    switch_key: # 英文模式切换键配置
      Shift_L: commit_text # 按下左`Shift`时（默认上屏候选项）
      Shift_R: commit_text # 按下右`Shift`时（默认上屏候选项）
      Control_L: commit_code # 按下左`Control`时（默认上屏编码）
      Control_R: commit_code # 按下右`Control`时（默认上屏编码）
      #Caps_Lock: inline_ascii # 按下`Caps Lock`时（默认保留输入区）
      Eisu_toggle: clear # 按下英数键（日文键盘）时（默认清空输入区）

  style/+:
    font_face: ".萍方-简" #"苹方-简,HYZhengYuan,TH-Tshyn-P2,Alibaba PuHuiTi 2.0 PingFang SC Medium 霞鹜文楷,"
    label_font_face: ".萍方-简" #"Alibaba PuHuiTi 2.0 PingFang SC Medium 霞鹜文楷,"
    comment_font_face: ".萍方-简" #"Alibaba PuHuiTi 2.0 PingFang SC Medium 霞鹜文楷,"
    display_tray_icon: false               #win右下角中英图标
    horizontal: true                     #水平模式
    preedit_type: composition  #composition 编码 / input 输入码 / preview 首选 / preview_all 内嵌
    label_format: "%s."
    inline_preedit: true
    font_point: 13
    label_font_point: 13
    comment_font_point: 12
    color_scheme: Win11light
    mark_text: "|"  # ￨  ,￨

    # 横排样式
    layout:
      min_width: 10
      margin_x: 16
      margin_y: 8
      border: 2
      spacing: 20 #候选间距
      candidate_spacing: 2
      #hilite_spacing: 6
      hilite_padding: 1
      hilite_padding_x: 4
      corner_radius: 10
      round_corner: 8
      shadow_radius: 8
      align_type: top           #"top" | "center" | "bottom"
    
    # 竖排样式
    # layout:
    #   min_width: 10
    #   margin_x: 12
    #   margin_y: 2
    #   border: 0
    #   candidate_spacing: 2
    #   hilite_spacing: 6
    #   hilite_padding: 2
    #   hilite_padding_x: 12
    #   shadow_radius: 8
