# Rime 天行键输入方案配置
# encoding: utf-8
# 版本: 2026年5月4日
# 作者: 大牛（吅吅大山）, 浮生 <wzxmer@outlook.com>

schema:
  schema_id: txjx
  name: 天行键
  icon: "tian.ico"
  version: "2026年5月4日"
  author:
    - 大牛（吅吅大山）
    - 浮生 <wzxmer@outlook.com>
  dependencies: [txjx.core, txjx.cx, txjx.danzi, txjx.gbk, liangfen]

# ==================== 输入法核心配置 ====================
engine:
  processors:
    - ascii_composer       # 英文模式处理
    - recognizer           # 特殊模式识别
    - lua_processor@*txjx_processor     # 按键处理（次选·空顶·顶功）
    - key_binder           # 快捷键绑定
    - speller              # 拼写处理
    - punctuator           # 标点处理
    - selector             # 候选选择
    - navigator            # 导航键
    - express_editor       # 快速编辑

  segmentors:
    - ascii_segmentor      # 英文分段
    - matcher              # 模式匹配
    - affix_segmentor@jderfen    # 二分前缀
    - affix_segmentor@gbk        # GBK前缀
    - abc_segmentor        # 字母分段
    - punct_segmentor      # 标点分段
    - fallback_segmentor   # 回退分段

  translators:
    - lua_translator@*txjx_core        # 低频扩展入口（计算器·时间转换）
    - table_translator     # 主词典
    - reverse_lookup_translator  # 反查（万能符 `）
    - punct_translator     # 标点翻译
    - history_translator@repeat_history  # 历史记录
    - script_translator@jderfen  # 二分翻译
    - script_translator@gbk      # GBK翻译

  filters:
    - lua_filter@*txjx_completion
    - reverse_lookup_filter@jderfen_lookup
    - reverse_lookup_filter@gbk_lookup
    - lua_filter@*txjx_reverse_hint
    - lua_filter@*txjx_filter
    - lua_filter@*txjx_opencc_filter
    # 内置 OpenCC simplifier 与 Lua Opencc(...) 在全量重部署后均不能稳定回落。
    # - simplifier@jffh
    # - simplifier@emoji_cn
    - uniquifier



# ==================== 输入法功能开关 ====================
switches:
  - name: ascii_mode      # 中英文切换
    states: [ 中文, 英文 ]

  - name: jffh            # 简繁切换
    states: [ 简体, 繁體 ]

  - name: completion      # 候选提示
    states: [提示关,提示开]

  - name: emoji_cn        # 表情开关
    states: [ 表情关, 表情开 ]

  - name: direct_symbols    # 符号直上屏
    states: [ 快符关, 快符开 ]

  - name: smarttwo        # 次选开关
    states: [ ";次选关", ";次选开" ]

  - name: jisuanqi        # 计算器开关
    states: [ 计算关, 计算开 ]

  - name: auto_fallback   # 空码自动回退
    states: [ 空顶关, 空顶开 ]

  - name: sbb_hint        # 630提示
    states: [ 630提示关, 630提示开 ]

  - name: full_shape      # 全角半角
    states: [ 半角, 全角 ]

# ==================== 标点符号配置 ====================
punctuator:
  digit_separator_action: commit
  #digit_separators: "./"
  import_preset: dicts/txjx.symbols

# ==================== 拼写处理 ====================
layout:
  topup:
    topup_this: "bcdefghjklmnpqrstwxyz"
    topup_with: "avuio;"
  algebra:
    - derive/^[bcdefghjklmnpqrstwxyz;]([bcdefghjklmnpqrstwxyz;][avuio].*)$/`$1/
    - derive/^([bcdefghjklmnpqrstwxyz;])[bcdefghjklmnpqrstwxyz;]([avuio].*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2})[avuio](.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{2}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{3}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{4}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{5}).$/$1`/
    - derive/^[bcdefghjklmnpqrstwxyz;]{2}([avuio`]*)$/``$1/

  patterns:
    special: "^(?:;?[avuio])[a-z]{0,}"

speller:
  auto_select: false   #自动上屏
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"
  algebra:
    - derive/[0-9]$//  #无数字
    - derive|^;|/|


# ==================== 词典配置 ====================
translator:
  dictionary: txjx.extended
  db_class: tabledb          # 强制只读，内存优化
  enable_charset_filter: false
  enable_sentence: false     # 禁用整句
  enable_user_dict: false    # 禁用用户词典
  max_phrase_length: 6
  initial_quality: 0

# ==================== 特殊功能配置 ====================
## 重复历史记录
repeat_history:
  input: i       # 触发键
  size: 1         # 记忆数量
  initial_quality: 10000

## 表情符号
emoji_cn:
  opencc_config: lua/Data/txjx.emoji.json
  option_name: emoji_cn
  tips: all
  show_in_comment: true

## 简繁转换
jffh:
  opencc_config: lua/Data/s2g.ocd2.json
  option_name: jffh
  tips: none
  tags: [ abc, jderfen, gbk, phrase, sentence, date, time, xiqy, jwql, "sjx/" ]

## OpenCC兼容替换器：读取 OpenCC json/txt，运行时用 LevelDb 查询以便内存回落
txjx_opencc_filter:
  db_name: lua/txjx_opencc_filter
  delimiter: "|"
  comment_format: "〔%s〕"
  chain: true
  rules:
    - option: emoji_cn
      mode: append
      comment_mode: none
      tags: [ abc ]
      prefix: "_em_"
      cand_type: emoji
      split: emoji
      file: lua/Data/txjx.emoji.txt
    - option: jffh
      mode: replace
      comment_mode: append
      sentence: true
      tags: [ abc, jderfen, gbk, phrase, sentence, date, time, xiqy, jwql, "sjx/" ]
      prefix: "_s2g_"
      opencc_config: lua/Data/s2g.ocd2.json

# ==================== 辅助词典配置 ====================
dict_keywords: "txjx"   # 统一辅助词典关键字；可写多个，用空格或逗号分隔，按顺序回退

# 1. 二分反查 (v) ------------------------------------------------
# 翻译器：负责从 liangfen 词库中查词
jderfen:
  tag: jderfen
  dictionary: dicts/liangfen
  enable_sentence: true
  enable_user_dict: false
  prefix: "v"
  tips: "〔二分〕"

# 读音/编码展示配置，供 lua_filter@*txjx_reverse_hint 使用
jderfen_lookup:
  tags: [jderfen]
  dictionary: dicts/txjx.cx
  option_name: jderfen_lookup
  overwrite_comment: true
  comment_format:
    - xform|^\(([^)]+)\) +|($1)★|
    - xform| +|, |
    - xform#^\(([^)]+)\)★(.+)$#[$1 | $2]#
    - xform|^\(([^)]+)\)(★)?$|[$1]|
    - xform|^([^\[].*)$|[$1]|

# 2. GBK反查 (o) ------------------------------------------------
# 翻译器：负责从 txjx.gbk 词库中查词
gbk:
  tag: gbk
  dictionary: dicts/txjx.gbk
  enable_sentence: true
  enable_user_dict: false
  prefix: "o"
  # tips: "〔GBK〕" # 可选提示

# 读音/编码展示配置，供 lua_filter@*txjx_reverse_hint 使用
gbk_lookup:
  tags: [gbk]
  dictionary: dicts/txjx.gbk
  option_name: gbk_lookup
  overwrite_comment: true
  comment_format:
    - xform|^\(([^)]+)\) +|($1)★|
    - xform| +|, |
    - xform#^\(([^)]+)\)★(.+)$#[$1 | $2]#
    - xform|^\(([^)]+)\)(★)?$|[$1]|
    - xform|^([^\[].*)$|[$1]|

# 3. 万能符反查 (`) ---------------------------------------------
# 翻译器：负责从 txjx.danzi 纯编码词典中查词
# 注释中的读音与编码展示统一由 txjx_reverse_hint 处理
reverse_lookup:
  tags: [reverse_lookup] # 独立 Tag，不被 Filter 拦截
  dictionary: dicts/txjx.danzi
  option_name: reverse_lookup
  enable_completion: false
  initial_quality: 0.5
  max_phrase_length: 6
  overwrite_comment: false
  comment_format:
    - xform|^\(([^)]+)\) +||
    - xform/ /, /

reverse_hint:
  dictionary: dicts/txjx.cx

# ==================== 快捷键配置 ====================
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }      # - 上翻页
    - { when: has_menu, accept: equal, send: Page_Down }   # = 下翻页
    - { when: has_menu, accept: Tab, send: 2 }             # Tab 选择次选


# ==================== 模式识别 ====================
recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
    reverse_lookup: "[a-z`]*`+[a-z`]*"
    punct: "^/([0-9]0?|[a-z]+)$" 
    jderfen: "^v[a-z']*'?$"
    gbk: "^o[a-z]*?$"
    jsq: "^=[^;']+$"

# ==================== 顶功配置 ====================
topup:
  __include: "layout/topup"
  min_length: 4
  max_length: 6
  auto_clear: true
  min_length_danzi: 2
  topup_command: false

# ==================== 菜单配置 ====================
menu:
  alternative_select_keys: 1234567890  # 数字选词
