# Rime 天行键输入方案
# encoding: utf-8
# 版本: 2026年5月9日
# 作者: 大牛（吅吅大山）, 浮生 <wzxmer@outlook.com>

schema:
  schema_id: txjx
  name: 天行键
  icon: "tian.ico"
  version: "2026年5月9日"
  author:
    - 大牛（吅吅大山）
    - 浮生 <wzxmer@outlook.com>
  dependencies: [txjx.core, txjx.cx, txjx.danzi, txjx.gbk, liangfen]

# ============ 引擎 ============
engine:
  processors:
    - lua_processor@*txjx_processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor

  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@jderfen
    - affix_segmentor@gbk
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor

  translators:
    - lua_translator@*txjx_core
    - table_translator
    - reverse_lookup_translator
    - punct_translator
    - history_translator@repeat_history
    - script_translator@jderfen
    - script_translator@gbk

  filters:
    - lua_filter@*txjx_completion
    - reverse_lookup_filter@jderfen_lookup
    - reverse_lookup_filter@gbk_lookup
    - lua_filter@*txjx_reverse_hint
    - lua_filter@*txjx_filter
    - lua_filter@*txjx_opencc_filter
    - uniquifier

# ============ 开关 ============
switches:
  - name: ascii_mode
    states: [ 中文, 英文 ]
  - name: jffh
    states: [ 简体, 繁體 ]
  - name: completion
    states: [ 提示关, 提示开 ]
  - name: emoji_cn
    states: [ 表情关, 表情开 ]
  - name: direct_symbols
    states: [ 快符关, 快符开 ]
  - name: smarttwo
    states: [ ";次选关", ";次选开" ]
  - name: jisuanqi
    states: [ 计算关, 计算开 ]
  - name: auto_fallback
    states: [ 空顶关, 空顶开 ]
  - name: sbb_hint
    states: [ 630提示关, 630提示开 ]
  - name: full_shape
    states: [ 半角, 全角 ]

ascii_composer:
  # Shift/Caps 有编码时由 txjx_processor 接管，避免切换中英或提交候选；
  # 这里保留无编码时的基础行为，勿改为全局 noop。
  switch_key:
    Caps_Lock: noop
    Shift_L: inline_ascii
    Shift_R: inline_ascii

# ============ 拼写 ============
speller:
  auto_select: false
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"
  algebra:
    - derive/[0-9]$//
    - derive|^;|/|

# ============ 标点 ============
punctuator:
  digit_separator_action: commit
  import_preset: txjx.symbols

# ============ 主词典 ============
translator:
  dictionary: txjx.extended
  db_class: tabledb
  enable_charset_filter: false
  enable_sentence: false
  enable_user_dict: false
  max_phrase_length: 6
  initial_quality: 0

# ============ 辅助功能 ============
repeat_history:
  input: i
  size: 1
  initial_quality: 10000

txjx_opencc_filter:
  db_name: "lua/txjx_opencc_filter"
  delimiter: "|"
  comment_format: "〔%s〕"
  chain: true
  rules:
    - option: jffh
      dataset_name: "s2g"
      prefix: "jffh/"
      mode: replace
      comment_mode: none
      sentence: true
      tags: [ abc, jderfen, gbk, phrase, sentence, date, time, xgqk, jdqk ]
    - option: emoji_cn
      dataset_name: "txjx.emoji"
      prefix: "emoji/"
      mode: append
      comment_mode: none
      split: emoji
      tags: [ abc, phrase, sentence, date, time, xgqk, jdqk ]

# ============ 反查 ============
dict_keywords: "txjx"

# 二分反查 (v)
jderfen:
  tag: jderfen
  dictionary: liangfen
  enable_sentence: true
  enable_user_dict: false
  prefix: "v"
  tips: "〔二分〕"

jderfen_lookup:
  tags: [jderfen]
  dictionary: txjx.cx
  option_name: jderfen_lookup
  overwrite_comment: true
  comment_format:
    - xform|^\(([^)]+)\) +|($1)★|
    - xform| +|, |
    - xform#^\(([^)]+)\)★(.+)$#[$1 | $2]#
    - xform|^\(([^)]+)\)(★)?$|[$1]|
    - xform|^([^\[].*)$|[$1]|

# GBK反查 (o)
gbk:
  tag: gbk
  dictionary: txjx.gbk
  enable_sentence: true
  enable_user_dict: false
  prefix: "o"

gbk_lookup:
  tags: [gbk]
  dictionary: txjx.gbk
  option_name: gbk_lookup
  overwrite_comment: true
  comment_format:
    - xform|^\(([^)]+)\) +|($1)★|
    - xform| +|, |
    - xform#^\(([^)]+)\)★(.+)$#[$1 | $2]#
    - xform|^\(([^)]+)\)(★)?$|[$1]|
    - xform|^([^\[].*)$|[$1]|

# 万能符反查 (`)
reverse_lookup:
  tags: [reverse_lookup]
  dictionary: txjx.danzi
  option_name: reverse_lookup
  enable_completion: false
  initial_quality: 0.5
  max_phrase_length: 6
  overwrite_comment: false
  comment_format:
    - xform|^\(([^)]+)\) +||
    - xform/ /, /

reverse_hint:
  dictionary: txjx.cx

# ============ 快捷键 ============
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: has_menu, accept: Tab, send: 2 }

# ============ 模式识别 ============
recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
    reverse_lookup: "[a-z`]*`+[a-z`]*"
    expression: "^=[^;']+$"
    punct: "^/([0-9]0?|[a-z]+)$"
    jderfen: "^v[a-z']*'?$"
    gbk: "^o[a-z]*?$"

# ============ 顶功 ============
topup:
  topup_this: "bcdefghjklmnpqrstwxyz"
  topup_with: "avuio;"
  min_length: 4
  max_length: 6
  auto_clear: true
  min_length_danzi: 2
  topup_command: false

layout:
  algebra:
    - derive/^[bcdefghjklmnpqrstwxyz;]([bcdefghjklmnpqrstwxyz;][avuio].*)$/`$1/
    - derive/^([bcdefghjklmnpqrstwxyz;])[bcdefghjklmnpqrstwxyz;]([avuio].*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2})[avuio](.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{2}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{3}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{4}).(.*)$/$1`$2/
    - derive/^([bcdefghjklmnpqrstwxyz;`]{2}[avuio`]{5}).$/$1`/
    - derive/^[bcdefghjklmnpqrstwxyz;]{2}([avuio`]*)$/``$1/
  patterns:
    special: "^(?:;?[avuio])[a-z]{0,}"

# ============ 菜单 ============
menu:
  alternative_select_keys: 1234567890
