# Rime schema settings
# encoding: utf-8

schema:
  schema_id: txjx.danzi
  name: 天行键单字编码辅助方案·勿选
  version: "2026年5月4日"
  author:
    - 浮生 <wzxmer@outlook.com>
  description: |
    仅用于部署 txjx.danzi 单字编码词典，供万能符反查与单字编码提示使用。

engine:
  processors:
    - key_binder
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba;'"
  initials: "abcdefghijklmnopqrstuvwxyz;'"
  delimiter: " '"
  max_code_length: 6
  algebra:
    - derive/^.(.*)$/`$1/
    - derive/^(.).(.*)$/$1`$2/
    - derive/^(..).(.*)$/$1`$2/
    - derive/^(...).(.*)$/$1`$2/
    - derive/^(....).(.*)$/$1`$2/
    - derive/^(.....).$/$1`/

translator:
  dictionary: dicts/txjx.danzi
  db_class: tabledb
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false

key_binder:
  import_preset: default
