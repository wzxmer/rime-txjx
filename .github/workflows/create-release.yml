name: Create Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Set up environment variables
        shell: bash
        run: |
          BASE_MAJOR=3
          BASE_MINOR=7
          BASE_PATCH=2

          # 下一次 run 78 对应 3.7.2；之后每次 +0.0.1，patch 到 9 后进位 minor。
          BASE_RUN_NUMBER=78

          CURRENT_RUN=${{ github.run_number }}
          VERSION_OFFSET=$(( CURRENT_RUN - BASE_RUN_NUMBER ))

          if [ "$VERSION_OFFSET" -lt 0 ]; then
            echo "CURRENT_RUN ${CURRENT_RUN} is lower than BASE_RUN_NUMBER ${BASE_RUN_NUMBER}" >&2
            exit 1
          fi

          TOTAL_PATCH=$(( BASE_PATCH + VERSION_OFFSET ))
          MINOR=$(( BASE_MINOR + TOTAL_PATCH / 10 ))
          PATCH=$(( TOTAL_PATCH % 10 ))

          VERSION="${BASE_MAJOR}.${MINOR}.${PATCH}"
          CURRENT_DATE="$(date +'%Y%m%d')"
          RELEASE_TITLE="天行键v${VERSION}"

          echo "CURRENT_RUN=${CURRENT_RUN}"
          echo "VERSION=${VERSION}"

          echo "CURRENT_DATE=${CURRENT_DATE}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=${RELEASE_TITLE}" >> "$GITHUB_ENV"

      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Zip main branch files excluding .git and .github
        run: zip -r txjx.zip . -x "*.git*" -x "*.github*"

      - name: Create Release
        id: create_release
        uses: shogo82148/actions-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.CURRENT_DATE }}
          release_name: ${{ env.RELEASE_TITLE }}
          body: |
            Release
          draft: false
          prerelease: false

      - name: Upload txjx.zip to Release
        uses: shogo82148/actions-upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./txjx.zip
          asset_name: txjx.zip
          asset_content_type: application/zip
